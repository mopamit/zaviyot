<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון זוויות - בניית חוצה זווית</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #e0e0e0;
            background-color: #ffffff;
            cursor: pointer;
            touch-action: none; /* מונע גלילה בזמן גרירה במובייל */
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body data-testim-main-word-scripts-loaded="true">
    <canvas id="angleCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById('angleCanvas');
        const ctx = canvas.getContext('2d');

        // צבעים מותאמים (זהים ליישומונים הקודמים)
        const gridColor = 'rgba(200, 200, 200, 0.3)';
        const rayColor = '#E74C3C';          // הקרן הנגררת (אדום)
        const fixedElementColor = '#34495E'; // קרניים קבועות וטקסט (כחול-אפור כהה)
        const arcFillColor = 'rgba(52, 152, 219, 0.3)';   // מילוי הקשת
        const arcStrokeColor = '#5DADE2';    // קו מתאר לקשת
        const measurementColor = '#E67E22';  // טקסט המידות (כתום)

        // הגדרות הזווית והנקודות בהתאם למשימה
        const config = {
            rayOA: 10,         // OA נמצאת 10 מעלות מעל האופק
            rayOB: 0,          // OB אופקית לחלוטין (0 מעלות)
            vertexLabel: "O",
            rayALabel: "A",
            rayBLabel: "B",
            rayCLabel: "C"
        };

        // מיקומים וגדלים על הקנבס
        const Vertex = { x: 150, y: 250 }; // הקודקוד בצד שמאל כדי לתת לקרניים מקום להימתח ימינה
        const rayLength = 300;
        const arcRadius = 140;
        
        // מצב נוכחי - הקרן האדומה OC מתחילה מתחת ל-OB בזווית שלילית
        let currentAngleOC = -15; 
        let isDragging = false;

        // פונקציות עזר מתמטיות
        const toRadians = (deg) => deg * Math.PI / 180;
        const toDegrees = (rad) => rad * 180 / Math.PI;

        // ציור רשת הרקע (משבצות)
        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 20) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 20) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            // חישוב הזווית הכוללת מ-OA ועד ל-OC
            const angleAOC = config.rayOA - currentAngleOC; 

            // ציור מילוי הקשת החלקית (מקרן OA ועד לקרן OC)
            if (currentAngleOC < config.rayOA) {
                ctx.save();
                ctx.fillStyle = arcFillColor;
                ctx.beginPath();
                ctx.moveTo(Vertex.x, Vertex.y);
                // בקנבס זוויות חיוביות יורדות למטה, לכן הופכים סימן (-) כדי להתאים למתמטיקה הסטנדרטית
                ctx.arc(Vertex.x, Vertex.y, arcRadius, toRadians(-config.rayOA), toRadians(-currentAngleOC), false);
                ctx.closePath();
                ctx.fill();

                // ציור קו המתאר של הקשת
                ctx.strokeStyle = arcStrokeColor;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(Vertex.x, Vertex.y, arcRadius, toRadians(-config.rayOA), toRadians(-currentAngleOC), false);
                ctx.stroke();
                ctx.restore();
            }

            // ציור הקרניים הקבועות OA ו-OB
            drawRay(Vertex.x, Vertex.y, config.rayOA, rayLength, fixedElementColor, 3); // OA
            const ax = Vertex.x + rayLength * Math.cos(toRadians(config.rayOA));
            const ay = Vertex.y - rayLength * Math.sin(toRadians(config.rayOA));
            drawLabel(ax + 20, ay - 15, config.rayALabel, fixedElementColor, 22, true);

            drawRay(Vertex.x, Vertex.y, config.rayOB, rayLength, fixedElementColor, 3); // OB
            const bx = Vertex.x + rayLength * Math.cos(toRadians(config.rayOB));
            const by = Vertex.y - rayLength * Math.sin(toRadians(config.rayOB));
            drawLabel(bx + 20, by, config.rayBLabel, fixedElementColor, 22, true);

            // ציור הקרן הנגררת האדומה OC
            drawRay(Vertex.x, Vertex.y, currentAngleOC, rayLength, rayColor, 4);
            const cx = Vertex.x + rayLength * Math.cos(toRadians(currentAngleOC));
            const cy = Vertex.y - rayLength * Math.sin(toRadians(currentAngleOC));
            drawLabel(cx + 20, cy + 15, config.rayCLabel, rayColor, 22, true);

            // ציור הקודקוד O (הנקודה המרכזית)
            drawPoint(Vertex.x, Vertex.y, fixedElementColor, 6);
            drawLabel(Vertex.x - 25, Vertex.y, config.vertexLabel, fixedElementColor, 22, true);

            // הצגת מדידת הזווית הכוללת AOC במרכז הקשת
            drawMeasurement(angleAOC);
        }

        // ציור קרן (כולל התאמה של ציר ה-Y שעולה למעלה כמינוס בקנבס)
        function drawRay(x, y, angleDeg, length, color, width) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + length * Math.cos(toRadians(angleDeg)), y - length * Math.sin(toRadians(angleDeg)));
            ctx.stroke();
            ctx.restore();
        }

        function drawPoint(x, y, color, radius) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawLabel(x, y, text, color, fontSize, bold = false) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `${bold ? 'bold' : 'normal'} ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        // ציור מידת הזווית בכתום
        function drawMeasurement(angleAOC) {
            if (angleAOC >= 5) { // הסתרת טקסט אם הזווית קטנה מדי
                const midAOC = (config.rayOA + currentAngleOC) / 2;
                const textRad = arcRadius * 0.70;
                
                const tx = Vertex.x + textRad * Math.cos(toRadians(midAOC));
                const ty = Vertex.y - textRad * Math.sin(toRadians(midAOC));
                drawLabel(tx, ty, `${Math.round(angleAOC)}°`, measurementColor, 18, true);
            }
        }

        // --- ניהול אינטראקציה וגרירה ---

        function updateAngleFromEvent(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (clientX - rect.left) * scaleX;
            const mouseY = (clientY - rect.top) * scaleY;

            const dx = mouseX - Vertex.x;
            const dy = Vertex.y - mouseY; // הפוך כי ה-Y עולה כלפי מטה בקנבס

            let angle = Math.atan2(dy, dx);
            let degrees = toDegrees(angle);

            // המרה לטווח 180- עד 180 לנוחות עבודה עם זוויות מתחת לאופק
            if (degrees > 180) degrees -= 360;

            // הגבלת הגרירה: מקרן OA (10 מעלות) ועד מקסימום 40- מעלות למטה
            if (degrees > config.rayOA && degrees <= 180) {
                degrees = config.rayOA;
            } else if (degrees < -40 || degrees > 180) {
                degrees = -40;
            }

            if (Math.abs(currentAngleOC - degrees) > 0.2) {
                currentAngleOC = degrees;
                draw();
            }
        }

        // אירועי עכבר
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        // אירועי מגע (מובייל/טאבלט)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', () => { isDragging = false; });

        // תקשורת postMessage מול ה-iframe (LMS)
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message.type === 'reset') {
                currentAngleOC = -15; // חזרה למצב ההתחלתי
                draw();
                window.parent.postMessage({ type: 'resetComplete', success: true }, '*');
            } else if (message.type === 'getState') {
                const angleAOC = Math.round(config.rayOA - currentAngleOC);
                window.parent.postMessage({ 
                    type: 'state', 
                    currentAngle: angleAOC, 
                    timestamp: Date.now() 
                }, '*');
            }
        });

        // ציור ראשוני
        draw();
    </script>
</body>
</html>
