<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון זוויות על קו ישר - 180°</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #e0e0e0;
            background-color: #ffffff;
            cursor: pointer;
            touch-action: none; /* מונע גלילה בזמן גרירה במובייל */
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body data-testim-main-word-scripts-loaded="true">
    <canvas id="angleCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById('angleCanvas');
        const ctx = canvas.getContext('2d');

        // הגדרת צבעים מותאמים לתמונה
        const gridColor = 'rgba(200, 200, 200, 0.3)';
        const rayColor = '#E74C3C';          // הקרן הנגררת (אדום)
        const fixedElementColor = '#34495E'; // קרניים קבועות וטקסט (כחול-אפור כהה)
        const arcFillColor = 'rgba(52, 152, 219, 0.3)';   // מילוי הקשת
        const arcStrokeColor = '#5DADE2';    // קו מתאר לקשת
        const measurementColor = '#E67E22';  // טקסט המידות (כתום)

        // הגדרות הזווית והנקודות
        const config = {
            startAngle: 0,     // קרן OA ימינה
            endAngle: 180,     // קרן OB שמאלה (זווית שטוחה)
            totalAngle: 180,
            vertexLabel: "O",
            startRayLabel: "A",
            endRayLabel: "B",
            fixedRays: [
                { angle: 66, label: "C" }  // קרן C ממוקמת ב-66 מעלות (כך ש-33 זה בדיוק החצי)
            ]
        };

        // מיקומים וגדלים על הקנבס
        const Vertex = { x: 300, y: 350 }; // הקודקוד במרכז למטה כדי להשאיר מקום לקשת של 180 מעלות
        const rayLength = 220;
        const arcRadius = 120;
        
        // מצב נוכחי - מתחיל ב-33 מעלות בדיוק כמו בתמונה (147 מעלות מהצד השני)
        let currentAngle = 33; 
        let isDragging = false;

        // פונקציות עזר מתמטיות
        const toRadians = (deg) => deg * Math.PI / 180;
        const toDegrees = (rad) => rad * 180 / Math.PI;

        // ציור רשת הרקע (משבצות)
        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 20) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 20) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            // ציור מילוי הקשת החצי מעגלית (0 עד 180)
            ctx.save();
            ctx.fillStyle = arcFillColor;
            ctx.beginPath();
            ctx.moveTo(Vertex.x, Vertex.y);
            // הקשת מצוירת נגד כיוון השעון (מינוס בציר Y)
            ctx.arc(Vertex.x, Vertex.y, arcRadius, 0, Math.PI, true);
            ctx.closePath();
            ctx.fill();

            // ציור קו המתאר של הקשת המלאה
            ctx.strokeStyle = arcStrokeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(Vertex.x, Vertex.y, arcRadius, 0, Math.PI, true);
            ctx.stroke();
            ctx.restore();

            // ציור הקו הישר AOB (0 ו-180 מעלות)
            drawRay(Vertex.x, Vertex.y, 0, rayLength, fixedElementColor, 3);   // קרן OA (ימינה)
            drawLabel(Vertex.x + rayLength + 25, Vertex.y, config.startRayLabel, fixedElementColor, 22, true);

            drawRay(Vertex.x, Vertex.y, 180, rayLength, fixedElementColor, 3); // קרן OB (שמאלה)
            drawLabel(Vertex.x - rayLength - 25, Vertex.y, config.endRayLabel, fixedElementColor, 22, true);

            // ציור הקרניים הפנימיות הקבועות (C)
            config.fixedRays.forEach((ray) => {
                drawRay(Vertex.x, Vertex.y, ray.angle, rayLength, fixedElementColor, 2);
                const px = Vertex.x + rayLength * Math.cos(toRadians(ray.angle));
                const py = Vertex.y - rayLength * Math.sin(toRadians(ray.angle));
                drawLabel(px + 20, py - 20, ray.label, fixedElementColor, 20, true);
            });

            // ציור הקרן הנגררת (האדומה - D)
            drawRay(Vertex.x, Vertex.y, currentAngle, rayLength, rayColor, 4);
            const dx = Vertex.x + rayLength * Math.cos(toRadians(currentAngle));
            const dy = Vertex.y - rayLength * Math.sin(toRadians(currentAngle));
            drawLabel(dx + 25, dy - 15, "D", rayColor, 22, true); // הטקסט D באדום כמו בתמונה

            // ציור הקודקוד O (הנקודה המרכזית)
            drawPoint(Vertex.x, Vertex.y, fixedElementColor, 6);
            drawLabel(Vertex.x, Vertex.y + 25, config.vertexLabel, fixedElementColor, 22, true);

            // הצגת מדידות הזוויות
            drawMeasurements();
        }

        // פונקציה לציור קרניים למעלה ולצדדים (מינוס בציר ה-Y)
        function drawRay(x, y, angleDeg, length, color, width) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + length * Math.cos(toRadians(angleDeg)), y - length * Math.sin(toRadians(angleDeg)));
            ctx.stroke();
            ctx.restore();
        }

        function drawPoint(x, y, color, radius) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawLabel(x, y, text, color, fontSize, bold = false) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `${bold ? 'bold' : 'normal'} ${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        // ציור המידות בכתום בתוך הקשת
        function drawMeasurements() {
            const angle1 = currentAngle;                  // זווית ימנית (AOD)
            const angle2 = config.totalAngle - currentAngle; // זווית שמאלית (BOD)
            const textRad = arcRadius * 0.55; // מרחק הטקסט מהקודקוד

            if (angle1 >= 5) { // הסתרת טקסט אם הזווית קטנה מדי
                const mid1 = angle1 / 2;
                const tx1 = Vertex.x + textRad * Math.cos(toRadians(mid1));
                const ty1 = Vertex.y - textRad * Math.sin(toRadians(mid1));
                drawLabel(tx1, ty1, `${Math.round(angle1)}°`, measurementColor, 18, true);
            }

            if (angle2 >= 5) {
                const mid2 = currentAngle + angle2 / 2;
                const tx2 = Vertex.x + textRad * Math.cos(toRadians(mid2));
                const ty2 = Vertex.y - textRad * Math.sin(toRadians(mid2));
                drawLabel(tx2, ty2, `${Math.round(angle2)}°`, measurementColor, 18, true);
            }
        }

        // --- ניהול אינטראקציה וגרירה ---

        function updateAngleFromEvent(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (clientX - rect.left) * scaleX;
            const mouseY = (clientY - rect.top) * scaleY;

            const dx = mouseX - Vertex.x;
            const dy = Vertex.y - mouseY; // הפוך כי ה-Y עולה כלפי מטה בקנבס

            let angle = Math.atan2(dy, dx);
            let degrees = toDegrees(angle);

            // טיפול במקרים שהעכבר יורד מתחת לקו האופקי
            if (degrees < 0) {
                if (degrees > -90) degrees = 0;   // נצמד לימין (0)
                else degrees = 180;               // נצמד לשמאל (180)
            }

            // הגבלת הגרירה ל-0 עד 180
            degrees = Math.max(0, Math.min(config.totalAngle, degrees));

            if (Math.abs(currentAngle - degrees) > 0.2) {
                currentAngle = degrees;
                draw();
            }
        }

        // אירועי עכבר
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        // אירועי מגע (מובייל/טאבלט)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', () => { isDragging = false; });

        // תקשורת postMessage מול ה-iframe (במידה וצריך ב-LMS)
        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message.type === 'reset') {
                currentAngle = 33; // חזרה למצב שמוצג בתמונה
                draw();
                window.parent.postMessage({ type: 'resetComplete', success: true }, '*');
            } else if (message.type === 'getState') {
                window.parent.postMessage({ 
                    type: 'state', 
                    currentAngle: Math.round(currentAngle), 
                    timestamp: Date.now() 
                }, '*');
            }
        });

        // ציור ראשוני
        draw();
    </script>
</body>
</html>
