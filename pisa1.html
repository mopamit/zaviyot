  <script>
  (function() {
      // 1. הגבלת ניסיונות הרמטית ל-2 ניסיונות בלבד
      let attempts = parseInt(sessionStorage.getItem('game_attempts_ai')) || 0;
      const MAX_ATTEMPTS = 2;

      function saveAttempts() {
          sessionStorage.setItem('game_attempts_ai', attempts);
      }

      // 2. חסימת כפתורים
      function disableButtons() {
          const checkBtns = document.querySelectorAll('[data-acc-text*="לחצו לבדיקה"], [data-acc-text*="צדקתי"]');
          const resetBtns = document.querySelectorAll('[data-acc-text*="איפוס"]');
          
          checkBtns.forEach(btn => {
              btn.style.pointerEvents = 'none';
              btn.style.opacity = '0.5';
              btn.setAttribute('disabled', 'true');
          });
          resetBtns.forEach(btn => {
              btn.style.pointerEvents = 'none';
              btn.style.opacity = '0.5';
              btn.setAttribute('disabled', 'true');
          });
      }

      // 3. הסרת 'התחל מחדש' מכל מקום
      function hideRestartButtons() {
          const restartBtns = document.querySelectorAll('[data-acc-text*="התחל מחדש"], [data-acc-text*="שחקו שוב"]');
          restartBtns.forEach(btn => {
              btn.style.display = 'none';
          });
      }

      // 4. טקסט סיום מותאם אישית
      function showCustomFeedback(score) {
          const feedbackEl = document.createElement('div');
          feedbackEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border:3px solid #1f497d;border-radius:12px;z-index:999999;color:#1f497d;font-size:28px;text-align:center;direction:rtl;box-shadow:0 10px 25px rgba(0,0,0,0.5);font-family:sans-serif;font-weight:bold;';
          feedbackEl.innerText = `לא נורא, אולי בפעם הבאה! הציון הסופי הוא ${score}`;
          document.body.appendChild(feedbackEl);
      }

      // האזנה שוטפת לשינויים במסך כדי לתפוס כפתורים שנוצרים דינמית
      const observer = new MutationObserver(() => {
          hideRestartButtons();

          // כפתור איפוס לא מאפס את הניסיונות של המשתמש!
          const resetBtn = document.querySelector('[data-acc-text*="איפוס"]');
          if (resetBtn && !resetBtn.dataset.hooked) {
              resetBtn.dataset.hooked = 'true';
              resetBtn.addEventListener('click', () => {
                  saveAttempts(); 
              });
          }

          // ספירת ניסיונות בעת לחיצה על בדיקה
          const checkBtn = document.querySelector('[data-acc-text*="לחצו לבדיקה"], [data-acc-text*="צדקתי"]');
          if (checkBtn && !checkBtn.dataset.hooked) {
              checkBtn.dataset.hooked = 'true';
              checkBtn.addEventListener('click', () => {
                  if (attempts < MAX_ATTEMPTS) {
                      attempts++;
                      saveAttempts();
                  }
              });
          }
      });

      observer.observe(document.body, { childList: true, subtree: true });

      // 5. שמירה על הקיים: יירוט postMessage
      const originalPostMessage = window.parent.postMessage;
      window.postMessage = window.parent.postMessage = function(message, targetOrigin, transfer) {
          
          if (message && typeof message.score !== 'undefined') {
              const score = message.score;
              
              if (score === 100 || score === 1) { // בהתאם לפורמט (0-1 או 0-100)
                  disableButtons();
                  const checkBtns = document.querySelectorAll('[data-acc-text*="לחצו לבדיקה"], [data-acc-text*="צדקתי"]');
                  checkBtns.forEach(btn => btn.style.display = 'none'); // הסתרת 'צדקתי' בניצחון
              } else if (attempts >= MAX_ATTEMPTS) {
                  disableButtons();
                  showCustomFeedback(score);
              }
          }
          
          // שחרור ההודעה הלאה
          if (originalPostMessage) {
              originalPostMessage.apply(this, arguments);
          }
      };

      // בדיקה בטעינת העמוד: אם נגמרו הניסיונות - נעל הכל
      if (attempts >= MAX_ATTEMPTS) {
          disableButtons();
      }

  })();
  </script>
