<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חידון זוויות - זווית 120° מורכבת מדוייקת</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 1px solid #e0e0e0;
            background-color: #ffffff;
            cursor: pointer;
            touch-action: none; /* מונע גלילה בזמן גרירה במובייל */
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body data-testim-main-word-scripts-loaded="true">
    <canvas id="angleCanvas" width="600" height="500"></canvas>

    <script>
        const canvas = document.getElementById('angleCanvas');
        const ctx = canvas.getContext('2d');

        // הגדרת צבעים
        const gridColor = 'rgba(200, 200, 200, 0.3)';
        const rayColor = '#E74C3C';          // הקרן הנגררת (אדום)
        const fixedElementColor = '#34495E'; // קרניים קבועות וטקסט
        const arcFillColor = 'rgba(52, 152, 219, 0.3)';   // מילוי הקשת
        const arcStrokeColor = '#5DADE2';    // קו מתאר לקשת
        const measurementColor = '#E67E22';  // טקסט המידות (כתום)

        const config = {
            totalAngle: 120,
            vertexLabel: "K",
            startRayLabel: "A",
            endRayLabel: "M",
            fixedRays: [
                { angle: 40, label: "B" },
                { angle: 80, label: "C" },
                { angle: 100, label: "D" }
            ]
        };

        // היררכיית אורכים ומיקומים מדוייקת לפי התמונה
        const Vertex = { x: 230, y: 400 }; 
        const lenA = 310;
        const lenM = 310;
        const lenB = 200;
        const lenC = 250;
        const lenD = 250;
        const lenRed = 280;
        const arcRadius = 110;
        
        let currentAngle = 90; 
        let isDragging = false;

        const toRadians = (deg) => deg * Math.PI / 180;
        const toDegrees = (rad) => rad * 180 / Math.PI;

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 20) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 20) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            // ציור הקשת
            ctx.save();
            ctx.fillStyle = arcFillColor;
            ctx.beginPath();
            ctx.moveTo(Vertex.x, Vertex.y);
            ctx.arc(Vertex.x, Vertex.y, arcRadius, 0, toRadians(-config.totalAngle), true);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = arcStrokeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(Vertex.x, Vertex.y, arcRadius, 0, toRadians(-config.totalAngle), true);
            ctx.stroke();
            ctx.restore();

            // ציור קרניים
            drawRay(Vertex.x, Vertex.y, 0, lenA, fixedElementColor, 3); // KA
            drawRay(Vertex.x, Vertex.y, config.totalAngle, lenM, fixedElementColor, 3); // KM
            drawRay(Vertex.x, Vertex.y, 40, lenB, fixedElementColor, 2); // KB
            drawRay(Vertex.x, Vertex.y, 80, lenC, fixedElementColor, 2); // KC
            drawRay(Vertex.x, Vertex.y, 100, lenD, fixedElementColor, 2); // KD
            drawRay(Vertex.x, Vertex.y, currentAngle, lenRed, rayColor, 3); // קרן אדומה מגררת

            // ציור הקודקוד
            drawPoint(Vertex.x, Vertex.y, fixedElementColor, 6);
            drawLabel(Vertex.x, Vertex.y + 25, config.vertexLabel, fixedElementColor, 20, false);

            // מיקום מדויק של האותיות בקצות הקרניים
            drawExactLabel(0, lenA, "A", 25, 0);
            drawExactLabel(120, lenM, "M", -20, -20);
            drawExactLabel(40, lenB, "B", 15, -20);
            drawExactLabel(80, lenC, "C", 5, -25);
            drawExactLabel(100, lenD, "D", -15, -25);

            // מדידות בכתום
            drawMeasurements();
        }

        function drawRay(x, y, angleDeg, length, color, width) {
            ctx.save();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + length * Math.cos(toRadians(angleDeg)), y - length * Math.sin(toRadians(angleDeg)));
            ctx.stroke();
            ctx.restore();
        }

        function drawPoint(x, y, color, radius) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // פונקציה לצייר טקסט (עם אפשרות לבחור בין כתב רגיל למודגש)
        function drawLabel(x, y, text, color, fontSize, isBold) {
            ctx.save();
            ctx.fillStyle = color;
            ctx.font = `${isBold ? 'bold ' : ''}${fontSize}px Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, x, y);
            ctx.restore();
        }

        // מיקום אות מדוייק עם היסט פיקסלים מקצה הקרן
        function drawExactLabel(angle, length, text, offsetX, offsetY) {
            const endX = Vertex.x + length * Math.cos(toRadians(angle));
            const endY = Vertex.y - length * Math.sin(toRadians(angle));
            drawLabel(endX + offsetX, endY + offsetY, text, fixedElementColor, 20, false);
        }

        function drawMeasurements() {
            const angleBottom = currentAngle;                  
            const angleTop = config.totalAngle - currentAngle; 
            const textRad = arcRadius * 0.65; 

            if (angleBottom >= 8) { 
                const mid1 = angleBottom / 2;
                const tx1 = Vertex.x + textRad * Math.cos(toRadians(mid1));
                const ty1 = Vertex.y - textRad * Math.sin(toRadians(mid1));
                drawLabel(tx1, ty1, `${Math.round(angleBottom)}°`, measurementColor, 16, true);
            }

            if (angleTop >= 8) {
                const mid2 = currentAngle + angleTop / 2;
                const tx2 = Vertex.x + textRad * Math.cos(toRadians(mid2));
                const ty2 = Vertex.y - textRad * Math.sin(toRadians(mid2));
                drawLabel(tx2, ty2, `${Math.round(angleTop)}°`, measurementColor, 16, true);
            }
        }

        // --- ניהול גרירה ---

        function updateAngleFromEvent(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const mouseX = (clientX - rect.left) * scaleX;
            const mouseY = (clientY - rect.top) * scaleY;

            const dx = mouseX - Vertex.x;
            const dy = Vertex.y - mouseY; 

            let angle = Math.atan2(dy, dx);
            let degrees = toDegrees(angle);

            if (degrees < 0) degrees += 360;

            if (degrees > config.totalAngle && degrees < 270) {
                degrees = config.totalAngle; 
            } else if (degrees >= 270 || degrees < 0) {
                degrees = 0;                 
            }

            if (Math.abs(currentAngle - degrees) > 0.2) {
                currentAngle = degrees;
                draw();
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            updateAngleFromEvent(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => { isDragging = false; });
        canvas.addEventListener('mouseleave', () => { isDragging = false; });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            updateAngleFromEvent(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', () => { isDragging = false; });

        window.addEventListener('message', function(event) {
            const message = event.data;
            if (message.type === 'reset') {
                currentAngle = 90; 
                draw();
                window.parent.postMessage({ type: 'resetComplete', success: true }, '*');
            } else if (message.type === 'getState') {
                window.parent.postMessage({ 
                    type: 'state', 
                    currentAngle: Math.round(currentAngle), 
                    timestamp: Date.now() 
                }, '*');
            }
        });

        // ציור ראשוני
        draw();
    </script>
</body>
</html>
